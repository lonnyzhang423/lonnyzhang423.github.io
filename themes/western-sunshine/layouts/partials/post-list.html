<ul id="post-list">
    {{ range where .Paginator.Pages "Params.hidden" "ne" "true" }}
    {{ $url := replace .Permalink .Site.BaseURL "" }}
    {{ if ne $url "about/" }}
    <li>
        <aside class="dates">{{ .Date.Format "2006-01-02" }}</aside>
        <a href='{{ .Permalink }}'>
            {{ .Title }}
        </a>
    </li>
    {{ end }}
    {{ end }}
</ul>
