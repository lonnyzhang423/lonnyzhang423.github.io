<ul id="post-list" class="archive readmore">
    <h3>更多</h3>

    {{ $posts := where .Site.RegularPages "Section" "eq" "posts" }}
    {{ range first 10 $posts }}
    <li>
        <a href="{{ .URL }}">{{ .LinkTitle }}<aside class="dates">{{ .Date.Format "2006-01-02" }}</aside></a>
    </li>
    {{ end }}
</ul>
