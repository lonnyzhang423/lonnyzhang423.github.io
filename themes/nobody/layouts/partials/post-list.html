<ul id="post-list">
    <!-- 筛选出top10的文章 -->
    {{ $top10Posts := where .Paginator.Pages "Section" "eq" "posts" }}
    {{ range $top10Posts }}
    <li>
        <a href="{{ .Permalink }}">
            {{ .Title }}
            <aside class="dates">{{ .Date.Format "2006-01-02" }}</aside>
        </a>
    </li>
    {{ end }}
</ul>
